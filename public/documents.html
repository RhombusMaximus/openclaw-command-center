<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents - OpenClaw Command Center</title>
    <style>
      :root {
        --bg: #0d1117;
        --card-bg: #161b22;
        --card-hover: #1c2128;
        --border: #30363d;
        --text: #c9d1d9;
        --text-muted: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --yellow: #d29922;
        --red: #f85149;
        --purple: #a371f7;
        --orange: #db6d28;
        --sidebar-width: 220px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
      }

      /* Sidebar styles */
      .sidebar { width: var(--sidebar-width); background: var(--card-bg); border-right: 1px solid var(--border); height: 100vh; position: fixed; top: 0; left: 0; display: flex; flex-direction: column; z-index: 60; }
      .sidebar.collapsed { width: 56px; }
      .sidebar.collapsed .sidebar-title, .sidebar.collapsed .nav-section-title, .sidebar.collapsed .nav-item span:not(.nav-icon), .sidebar.collapsed .nav-badge, .sidebar.collapsed .sidebar-footer { display: none; }
      .sidebar.collapsed .sidebar-header { justify-content: center; padding: 16px 8px; }
      .sidebar.collapsed .sidebar-toggle { margin-left: 0; }
      .sidebar.collapsed .nav-item { justify-content: center; padding: 12px; }
      .sidebar.collapsed .nav-icon { margin: 0; font-size: 1.2rem; }
      .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
      .sidebar-logo { font-size: 1.3rem; }
      .sidebar-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; }
      .sidebar-toggle { margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; border-radius: 6px; font-size: 1rem; }
      .sidebar-toggle:hover { background: var(--bg); color: var(--text); }
      .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
      .nav-section { margin-bottom: 16px; }
      .nav-section-title { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); padding: 8px 12px 4px; letter-spacing: 0.5px; }
      .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); transition: all 0.15s; text-decoration: none; }
      .nav-item:hover { background: var(--bg); color: var(--text); }
      .nav-item.active { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
      .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
      .nav-badge { margin-left: auto; background: var(--border); padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
      .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--text-muted); text-align: center; }

      /* Main wrapper */
      .main-wrapper { flex: 1; margin-left: var(--sidebar-width); transition: margin-left 0.2s ease; display: flex; flex-direction: column; min-height: 100vh; }
      .main-wrapper.sidebar-collapsed { margin-left: 56px; }

      /* Header */
      header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--card-bg); position: sticky; top: 0; z-index: 50; }
      .header-left { display: flex; align-items: center; gap: 16px; }
      .page-title { font-size: 1.1rem; font-weight: 600; }
      .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; text-decoration: none; transition: all 0.15s; }
      .back-btn:hover { border-color: var(--accent); color: var(--text); }
      .header-actions { display: flex; gap: 8px; align-items: center; }
      .btn-primary { padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; border: 1px solid var(--border); background: var(--accent); color: #fff; border-color: var(--accent); transition: all 0.15s; }
      .btn-primary:hover { background: #4c9aed; }

      /* Main content */
      main { padding: 24px; flex: 1; }

      /* Search bar */
      .search-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
      .search-input { flex: 1; padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
      .search-input:focus { border-color: var(--accent); }
      .search-count { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }

      /* Table */
      .docs-table { width: 100%; border-collapse: collapse; }
      .docs-table th, .docs-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
      .docs-table th { color: var(--text-muted); font-weight: 500; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; background: var(--card-bg); position: sticky; top: 0; cursor: pointer; user-select: none; }
      .docs-table th:hover { color: var(--text); }
      .docs-table th .sort-icon { margin-left: 4px; opacity: 0.4; }
      .docs-table th.sorted .sort-icon { opacity: 1; }
      .docs-table tbody tr:hover td { background: var(--card-hover); }
      .doc-name { font-weight: 500; max-width: 300px; }
      .doc-desc { color: var(--text-muted); font-size: 0.8rem; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .doc-actions { display: flex; gap: 8px; }
      .action-btn { padding: 5px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-size: 0.75rem; color: var(--text); cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
      .action-btn:hover { border-color: var(--accent); color: var(--accent); }
      .action-btn.download:hover { border-color: var(--green); color: var(--green); }

      /* Loading */
      .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-muted); }
      .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Empty state */
      .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
      .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }

      @media (max-width: 768px) {
        .sidebar { transform: translateX(-100%); }
        .sidebar.visible { transform: translateX(0); }
        .main-wrapper { margin-left: 0; }
        .docs-table { display: block; overflow-x: auto; }
      }
    </style>
    <script src="/js/sidebar.js"></script>
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-wrapper" id="main-wrapper">
      <header>
        <div class="header-left">
          <a href="/" class="back-btn">← Back</a>
          <h1 class="page-title">📄 Documents</h1>
        </div>
        <div class="header-actions">
          <button class="btn-primary" onclick="fetchDocuments()">🔄 Refresh</button>
        </div>
      </header>
      <main>
        <div class="search-bar">
          <input type="text" class="search-input" id="search-input" placeholder="Search documents by name or description..." oninput="filterDocs()" />
          <span class="search-count" id="search-count"></span>
        </div>

        <div id="loading" class="loading">
          <div class="loading-spinner"></div>
          <span>Loading documents...</span>
        </div>
        <div id="empty-state" class="empty-state" style="display:none">
          <div class="empty-state-icon">📄</div>
          <div>No documents found</div>
        </div>
        <div id="no-results" class="empty-state" style="display:none">
          <div class="empty-state-icon">🔍</div>
          <div>No documents match your search</div>
        </div>
        <div style="overflow-x:auto" id="table-container" style="display:none">
          <table class="docs-table">
            <thead>
              <tr>
                <th onclick="sortDocs('name')" class="sorted" id="th-name">Name <span class="sort-icon">↑</span></th>
                <th onclick="sortDocs('description')" id="th-description">Description <span class="sort-icon">↑</span></th>
                <th style="cursor:default">Actions</th>
              </tr>
            </thead>
            <tbody id="docs-tbody"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script>
      let allDocs = [];
      let filteredDocs = [];
      let sortField = 'name';
      let sortAsc = true;

      function escapeHtml(text) {
        if (!text) return '';
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
      }

      function snippet(text, len = 100) {
        if (!text) return '—';
        return text.length > len ? text.slice(0, len) + '…' : text;
      }

      function filterDocs() {
        const q = document.getElementById('search-input').value.toLowerCase();
        filteredDocs = allDocs.filter(d =>
          (d.name || '').toLowerCase().includes(q) ||
          (d.description || '').toLowerCase().includes(q)
        );
        sortDocs(sortField, true);
      }

      function sortDocs(field, keepSort = false) {
        if (!keepSort && field === sortField) {
          sortAsc = !sortAsc;
        } else if (!keepSort) {
          sortField = field;
          sortAsc = true;
        }

        filteredDocs.sort((a, b) => {
          const va = (a[field] || '').toLowerCase();
          const vb = (b[field] || '').toLowerCase();
          if (va < vb) return sortAsc ? -1 : 1;
          if (va > vb) return sortAsc ? 1 : -1;
          return 0;
        });

        // Update sort indicators
        document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
        const th = document.getElementById('th-' + field);
        if (th) {
          th.classList.add('sorted');
          th.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
        }

        renderDocs();
      }

      function renderDocs() {
        const loading = document.getElementById('loading');
        const empty = document.getElementById('empty-state');
        const noResults = document.getElementById('no-results');
        const table = document.getElementById('table-container');
        const tbody = document.getElementById('docs-tbody');
        const count = document.getElementById('search-count');

        if (allDocs.length === 0) {
          loading.style.display = 'none';
          table.style.display = 'none';
          noResults.style.display = 'none';
          empty.style.display = 'block';
          count.textContent = '';
          return;
        }

        loading.style.display = 'none';
        empty.style.display = 'none';

        if (filteredDocs.length === 0) {
          table.style.display = 'none';
          noResults.style.display = 'block';
          count.textContent = '0 of ' + allDocs.length;
          return;
        }

        noResults.style.display = 'none';
        table.style.display = 'block';
        count.textContent = `${filteredDocs.length} of ${allDocs.length} documents`;

        tbody.innerHTML = filteredDocs.map(doc => `
          <tr>
            <td class="doc-name">${escapeHtml(doc.name)}</td>
            <td class="doc-desc" title="${escapeHtml(doc.description || '')}">${escapeHtml(snippet(doc.description))}</td>
            <td class="doc-actions">
              ${doc.url ? `<a href="${escapeHtml(doc.url)}" target="_blank" rel="noopener" class="action-btn">🔗 Open</a>` : ''}
              <button class="action-btn download" onclick="downloadDoc('${escapeHtml(doc.id || doc.name)}', '${escapeHtml(doc.name)}')">💾 Download</button>
            </td>
          </tr>
        `).join('');
      }

      async function downloadDoc(id, name) {
        try {
          const res = await fetch(`/api/notion/documents/${encodeURIComponent(id)}`);
          const data = await res.json();
          const content = data.content || data.text || JSON.stringify(data, null, 2);
          const blob = new Blob([content], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = (name || 'document') + '.txt';
          a.click();
          URL.revokeObjectURL(url);
        } catch (e) {
          console.error('Download failed:', e);
        }
      }

      async function fetchDocuments() {
        try {
          const res = await fetch('/api/notion/documents');
          const data = await res.json();
          allDocs = data.documents || data || [];
          filteredDocs = [...allDocs];
          sortDocs(sortField, true);
        } catch (e) {
          console.error('Failed to fetch documents:', e);
        }
      }

      fetchDocuments();
    </script>
  </body>
</html>
